<!doctype html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="glass"></div>
<style>
  @property --t {
    syntax: "<number>";
    initial-value: 0;
    inherits: true;
  }

  :root{
    --color-ground: #141109;
    --color-sky: #88A5DA;
    --color-sun: #FF08;
    --deg: 180;
    --degSun: 0;
    --bg: transparent;
    --pi: 3.14159;
    --t: 0;
  }

  @keyframes tick {
    from { --t: 0; }
    to { --t: 2147483647; }
  }

  html {
    animation: tick 1000000s linear infinite;
  }

  html, body {
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    margin: 0;
    padding: 0;
  }
  .glass, .drop {
    --rad: calc((var(--deg) + var(--degSun)) * var(--pi) / 180);

    --p1-rad: calc(var(--rad) + 0.00005*var(--t));
    --p1-d: 50%;
    --p1-x: calc(50% + var(--p1-d) * cos(var(--p1-rad)));
    --p1-y: calc(50% + var(--p1-d) * sin(var(--p1-rad)));
    --bg: 
      linear-gradient(calc(var(--deg)*1deg),transparent 40%,var(--color-ground) 80%),
      radial-gradient(circle at var(--p1-x) var(--p1-y), #fffb 0 15%, var(--color-sun) 20%, transparent 30%),
      var(--color-sky)
    ;

    --ps-rad: calc((var(--deg) + 90) * var(--pi) / 180);
    --ps-d: 1px;
    --ps-x: calc(var(--ps-d) * cos(var(--ps-rad)));
    --ps-y: calc(var(--ps-d) * sin(var(--ps-rad)));
    
    --color-ground-a: rgb(from var(--color-ground) r g b / 0.3);
    --color-sky-a: rgb(from var(--color-sky) r g b / 0.05);
    --color-sky-aa: rgb(from var(--color-sky) r g b / 0.3);

    &.drop:after {
      box-shadow: 
        var(--ps-x) var(--ps-y) 1px var(--color-ground-a),
        var(--ps-x) var(--ps-y) 1px var(--color-sky-a) inset
      ;
    }

    transition: background 300ms linear;

  }
  .glass {
    position: relative;
		width: 100vw;
		height: 100vh;
    margin-bottom: 1px;
    background: var(--bg);
    background-size: 100%;
    background-repeat: no-repeat;
		overflow: hidden;
  }
  .drop{

    --dripOffset: calc(10px*tan(0.00001*var(--t) + var(--seed)/var(--mod)*var(--pi)));

    position: absolute;
		width: var(--w);
		height: var(--h);
    margin-top: var(--dripOffset);

    &:after{
      content: '';
      position: absolute;
      display: block;
      width: 100%;
      height: 100%;
      background: var(--bg);
      transform: rotate(calc(-1deg*var(--deg)));
      border-radius: var(--borderRadius);
    }

    &:before {
      content: '';
      display: block;
      width: 90%;
      height: calc(abs(0.25 * var(--dripOffset)));
      position: absolute;
      left: 10%;
      bottom: calc(0.5 * var(--h));
      background:
        radial-gradient(circle at bottom center, var(--color-ground), transparent calc(0.7*var(--w))),
        radial-gradient(ellipse at bottom left, var(--color-ground-a), transparent 70%),
        radial-gradient(ellipse at bottom right, var(--color-sky-aa), transparent 70%)
      ;
      border-radius: var(--borderRadius);
    }
  }
</style>

<script>
  const multiplier = 1664525
  const increment = 1013904223
  const modulus = 4294967296
  let seed = (Math.random()*multiplier)<<0
  function random(_seed){
    return seed = ( (_seed||seed) * multiplier + increment ) % modulus
  }
  function rand(_seed){
    return random(_seed)/modulus
  }

  const {body} = document

  body.style.setProperty('--mod', modulus)

  const glass = document.querySelector('.glass')
  
  reset()
  resetColor()

  function reset(){ 
    const {clientWidth:w,clientHeight:h} = document.documentElement

    const num = w*h/1400<<0
    fillElement(glass, num, 'drop')

    const wh = Math.ceil(Math.sqrt((w*h)/num))
    const ww = Math.ceil(w/wh)
    const hh = 2*wh-Math.sqrt(wh*wh/2)

    Array.from(glass.children).forEach((drop,i)=>{
      const {style} = drop

      const size = 10 + 15*rand()*rand()
      const deg = (360*rand())<<0
      const xx = Math.ceil(i%ww)
      const yy = Math.floor(i/ww)

      Object.assign(style, {
        left: 0.25*wh 
            + wh*xx 
            + (wh-size/2)*(rand()-0.5) 
            + 'px',
        top:  0.25*wh 
            + hh*yy 
            + (wh-size/2)*(rand()-0.5) 
            + (xx%2*wh/2)
            + 'px'
      })
      style.setProperty('--w', (size+0.3*rand()) + 'px')
      style.setProperty('--h', (size+0.3*rand()) + 'px')
      style.setProperty('--deg', deg)
      style.setProperty('--seed', seed)
      style.setProperty('--borderRadius', [0,0,0,0].map(()=>(40+50*rand()<<0) + 'px').join(' '))
    })
  }
  
  function resetColor(){
    body.style.setProperty('--color-ground', `hsl(${rand()*360} ${rand()*100<<0}% ${10+rand()*10<<0}%)`)
    body.style.setProperty('--color-sky', `hsl(${rand()*360} ${20+rand()*70<<0}% ${50+rand()*40<<0}%)`)
    body.style.setProperty('--color-sun', `hsl(${rand()*360} ${20+rand()*80<<0}% ${80+rand()*20<<0}%)`)
  }
  
  glass.addEventListener('click',()=>{
    resetColor()
    body.style.setProperty('--degSun', rand()*360<<0)
  })

  new ResizeObserver(reset).observe(glass)
  
  function fillElement(elm,numTarget,className){
    const numCurrent = elm.children.length
    if (numCurrent>numTarget) {
      while (elm.children.length>numTarget) elm.firstChild.remove()
    } else if (numCurrent<numTarget) {
      const fragment = document.createDocumentFragment()
      Array.from(new Array(numTarget-numCurrent)).forEach(()=>{
        const child = document.createElement('div')
        child.classList.add(className)
        fragment.appendChild(child)
      })
      elm.appendChild(fragment)
    }
  }
</script>
</body>
