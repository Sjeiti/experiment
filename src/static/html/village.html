<body>
  <div class="ground"></div>
  <div class="map"></div>
  <svg></svg>
  <form></form>
<style>
:root {
  --deg: 0;
  --radians: 0;
  --lightRadians: -1.1;
  --w: 40;
  --h: 40;
  --sin: 1;
  --t: 1;
  --addRotation: 0;
  --lightDist: 4;

  --size: 1em;
  --color: #F04;
  --color-ground: #939B8B;
  --color-ground: #64694E;
  --color-ground: #48503f;
  --color-roof: #D0742B;
  --color-wall: #CBCB90;
  --color-dark: #FA0044;
  --color-light: #F2B;
  
}
html {
  box-sizing: border-box;
}
*, *:before, *:after {
  box-sizing: inherit;
}
html,body{
  width: 100%;
  height: 100%;
  margin:0;
  padding:0;
}
.ground {
  position: absolute;
  z-index: 2;
  inset: 0;
  background-color: var(--color-ground);
  height: calc(100vh + 1px);
  &:before,&:after {
    content: '';
    position: absolute;
    inset: 0;
  }
  &:before {
    background: var(--noise);
    mix-blend-mode: multiply;
    opacity: 0.4;
  }
  &:after {
    background: var(--hills);
    mix-blend-mode: screen;
    opacity: 0.2;
  }
}
svg {
  position: absolute;
  left: 0;
  top: 0;
  z-index: 2;
  path {
    stroke-width: 4px;
    fill: transparent;
    stroke: #432a;
    box-shadow:  0 0 0 1px red;
  }
  circle {
    fill: red;
    fill: transparent;
  }
}
form {
  display: none;
  position: absolute;
  left: 0;
  bottom: 0;
  z-index: 10;
  width: 100%;
  padding: 1rem;
  input { width: calc(100% - 2rem); }
  label { display: block; }
}
.map {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 3;
  overflow: hidden;
  transition: all 300ms ease;
  .house, .tree {
    --degHouse: calc(var(--deg) + var(--addRotation));
    --radians: calc((var(--degHouse))/-180*pi);
    --rdns: calc(var(--radians) + var(--lightRadians));
    ---rdns: calc(var(--radians));
    --emX: calc(cos(var(--rdns))*-1em);
    --emY: calc(sin(var(--rdns))*-1em);

    --pcRds: calc(0.5*PI);
    --lightDistEm: calc(1em*var(--lightDist));
    --pcX: calc(cos(var(--pcRds))*var(--lightDistEm));
    --pcY: calc(sin(var(--pcRds))*var(--lightDistEm));
    
    position: absolute;
    left: calc(1px*var(--x));
    top: calc(1px*var(--y));
    display: block;
    width:  calc(1em*var(--w));
    height: calc(1em*var(--h));
    transform: translate(-50%,-50%) rotate(calc(1deg*var(--degHouse)));

    background: var(--color-roof) linear-gradient(#0002 0 50%, #fff2 50% 100%);
    box-shadow: 
      var(--emX) var(--emY) 0.5em #0003,
      calc(0.5*var(--emX)) calc(0.5*var(--emY)) 0.25em #0003,
      calc(0.25*var(--emX)) calc(0.25*var(--emY)) 0.125em #0003
    ;

    background: var(--color-roof) conic-gradient(
      from calc(-1deg*var(--degHouse) + var(--lightRadians)/PI*180deg + 90deg)
      at calc(50% + var(--pcX)) calc(50% + var(--pcY)),
      #fff4 0deg,
      #8880 90deg,
      #0004 180deg, 
      #8880 270deg,
      #fff4 360deg
    );
    &:before{
      content: '';
      display: block;
      width: 100%;
      height: 50%;
      position: absolute;
      left: 0;
      top: 50%;

      background: var(--color-roof) conic-gradient(
        from calc(-1deg*var(--degHouse) + var(--lightRadians)/PI*180deg + 90deg + 180deg)
        at calc(50% + var(--pcX)) calc(50% + var(--pcY)),
        #fff4 0deg,
        #8880 90deg,
        #0004 180deg, 
        #8880 270deg,
        #fff4 360deg
      );
    }
    &.tree {
      z-index: 6;
      --pcRds: 0;
      border-radius: 50%;
      transform: initial;
      overflow: hidden;
      --pc: 40%;
      --pcX: calc( var(--pc) * cos(var(--lightRadians)));
      --pcY: calc( var(--pc) * sin(var(--lightRadians)));
      background: radial-gradient(
        circle at calc(50% + var(--pcX)) calc(50% + var(--pcY)), 
        #872, 
        #432 100%
      );
      --em: calc(-0.6em * var(--w));
      --emX: calc( var(--em) * cos(var(--lightRadians)));
      --emY: calc( var(--em) * sin(var(--lightRadians)));
      box-shadow: 
        var(--emX) var(--emY) 0.5em #0002,
        calc(0.5*var(--emX)) calc(0.5*var(--emY)) 0.25em #0002,
        calc(0.25*var(--emX)) calc(0.25*var(--emY)) 0.125em #0002
      ;
      &:before {
        inset: 0;
        height: initial;
        background: var(--noise);
        background-repeat: repeat;
        mix-blend-mode: lighten;
        opacity: 0.2;
      }
    }
  }
}
</style>
<script>
const multiplier = 1664525
const increment = 1013904223
const modulus = 4294967296
//let seed = 217197374//(Math.random()*multiplier)<<0
let seed = (Math.random()*multiplier)<<0
function random(_seed){
  return seed = ( (_seed||seed) * multiplier + increment ) % modulus
}
function rand(_seed){
  return random(_seed)/modulus
}

const {body} = document
const {style} = body

const {sin,cos,PI,sqrt,abs} = Math
let {clientHeight:h,clientWidth:w} = body

const name = 'map'

const main = document.querySelector('.'+name)
const mainStyle = main.style

const svg = document.querySelector('svg')

const form = document.querySelector('form')

const div = document.createElement('div')
div.innerHTML = `<div class="house"></div>`
const blueprint = div.querySelector('.house')
div.innerHTML = `<div class="tree"></div>`
const blueprintTree = div.querySelector('.tree')

const xmlns = 'http://www.w3.org/2000/svg'

const lines = []

reset()
initUI()
new ResizeObserver(reset).observe(body)

function reset(){
  w = body.clientWidth
  h = body.clientHeight

  main.style.fontSize = sqrt(w*h*4E-5) + 'px'
  empty(main,svg)

  drawGround()
  drawRoads()
  drawTrees()
  drawHouses()
  drawNoise()
}
 
function drawGround(){
  style.setProperty('--hills',a(9).map((o,i)=>`radial-gradient(circle
        at ${50+r(100)<<0}% ${50+r(100)<<0}%,
        ${i%2&&'#fff'||'#000'},
        transparent ${40+r(20)<<0}%)
    `).join(','))
}

function drawRoads(){
  
  lines.length = 0

  svg.setAttributeNS(null, 'viewBox', '0 0 ' + w + ' ' + h)
  svg.setAttributeNS(null, 'width', w)
  svg.setAttributeNS(null, 'height', h)

  const path = document.createElementNS(xmlns, 'path')
  svg.appendChild(path)

  const vs = normalized([r(),r()])
  const d0 = getD(w/2,h/2,vs)
  const d1 = getD(w/2,h/2,vs.map(n=>-n))

  const ds = [d0,d1,...a(7).map(()=>{
    const points = getRandom(lines)
    const p1 = getRandom(points)
    const isPointEdge = lines.reduce((acc,points,i)=>{
      acc.push(points[0].join())
      acc.push(points[points.length-1].join())
      return acc
    },[]).includes(p1.join())
    const n1 = points.indexOf(p1)
    const n2 = n1===0?1:n1-1
    const p2 = points[n2]
    const side = r()<0&&1||-1
    const v = p2&&perpendicular(normalized([side*(p1[0]-p2[0]),side*(p1[1]-p2[1])]))
    return !isPointEdge&&v&&getD(...p1,v)||''
  })].join('')

  path.setAttributeNS(null, 'd', ds)
}

function drawTrees(){
  a(222).map((a,b,c,d,x,y,deg)=>{
    const tree = blueprintTree.cloneNode(true)
    const {style} = tree
    style.setProperty('--deg',deg||rand()*360)
    const size = 3+rand()*3
    style.setProperty('--w',size)
    style.setProperty('--h',size)
    style.setProperty('--x',rand()*w)
    style.setProperty('--y',rand()*h)
    main.appendChild(tree)
  })
}

function drawHouses(){
  lines.forEach(points=>{ 
    for(let i=0;i<3;i++){
      const p1 = getRandom(points,true)
      const n1 = points.indexOf(p1)
      const n2 = n1===0?1:n1-1
      const p2 = points[n2]
      p2&&addHouses(...p1,...p2)
    }
  })
}

function drawNoise(){
  style.setProperty('--noise', `url(${makeNoiseDataURL()})`)
}

function initUI(){
  addInput('button',null,e=>{
    reset()
  },{value:'reset'})
  addInput('range','light',e=>
    setCSSProp('lightRadians', 0.1*e.target.valueAsNumber)
  )
  addInput('range','rotation',e=>
    setCSSProp('addRotation', 2*3.6*e.target.valueAsNumber)
  )
  addInput('range','distance',e=>
    setCSSProp('lightDist', 0.05*e.target.valueAsNumber)
  )
  body.addEventListener('dblclick', (event) => {
    form.style.display = form.style.display==='block'?'none':'block'
  })
}

function getD(x,y,_v){
  helperPoint(x,y) 
  let v = _v||normalized([rand(),rand()])
  let d = `M ${x} ${y} `
  const dist = 44
  const points = []
  points.push([x,y])
  while (x>0&&x<w&&y>0&&y<h){
    const [vx,vy] = v

    const nx = x + dist*vx
    const ny = y + dist*vy
    const hx = x + (nx-x)/2 + r(0.8*dist)
    const hy = y + (ny-y)/2 + r(0.8*dist)
    d = d + ` S ${hx} ${hy}, ${nx} ${ny} `
    points.push([nx,ny])
    helperPoint(nx,ny)

    //

    const sa = 8
    const [vax,vay] = getAway([nx,ny],dist)

    const diff = 1
    v = normalized([
      vx + r(diff) + sa*vax,
      vy + r(diff) + sa*vay
    ])

    x = nx
    y = ny
  }
  lines.push(points)
  return d
}

function getAway(point,minDist){
  const [x,y] = point
  let vx = 0
  let vy = 0
  lines.forEach(points=>{
    points.forEach(p=>{
      const [px,py] = p
      const vpx = x-px
      const vpy = y-py
      const d = distance([vpx,vpy])
      if (d>minDist){
        const f = 1/(d*d)
        //console.log('f',f,vpx,vpy,p)
        vx = vx + f*vpx
        vy = vy + f*vpy
      }
    })
  })
  //console.log('away',vx,vy)
  return [vx,vy]
}

function getRandom(from,edge){
  const {length} = from
  if (edge) {
    const nr = (rand()*rand()*rand()*length)<<0
    const end = r()<0?nr:length-nr-1
    return from[end]
  }
  return from[rand()*length<<0]
}

function addHouses(x1,y1,x2,y2){
  for(let i=0;i<3;i++){
    const v = [x1-x2,y1-y2]
    const d = distance(v) // Math.sqrt(v[0]*v[0] + v[1]*v[1])
    const n = normalized(v)
    const part = [
      x1 + rand()*d*n[0],
      y1 + rand()*d*n[1]
    ]
    const side = r()<0&&1||-1
    const s = perpendicular(n)
    const p = [side*s[0],side*s[1]]
    const x = part[0] + 10*p[0]
    const y = part[1] + 10*p[1]
    const deg = vectorToDegrees(v) + (r()>0?90:0)
    addHouse(x,y,deg)
  }
}

function addHouse(x,y,deg){
  const house = blueprint.cloneNode(true)
  const {style} = house
  style.setProperty('--deg',deg||rand()*360)
  style.setProperty('--w',2+rand()*3)
  style.setProperty('--h',2+rand()*3)
  style.setProperty('--x',x||rand()*100)
  style.setProperty('--y',y||rand()*100)
  main.appendChild(house)
}

function a(n){
  return Array.from(new Array(n))
}

function r(n=1){
  return n*(rand()-0.5)
}

function normalized(v){
  const [x,y] = v
  const d = distance(v)
  return [x/d, y/d]
}

function perpendicular([x,y]){
  return [y, -x]
}

function distance([x,y]){
  return sqrt(x*x + y*y)
}

function vectorToDegrees([x,y]){
  return Math.atan2(y, x) * (180 / Math.PI);
}

function empty(...parents){
  parents.forEach(p=>{
    while (p.firstChild) p.firstChild.remove()
  })
}

function helperPoint(x,y){
  const circle = document.createElementNS(xmlns, 'circle')
  circle.setAttributeNS(null, 'cx', x)
  circle.setAttributeNS(null, 'cy', y)
  circle.setAttributeNS(null, 'r', 3)
  svg.appendChild(circle)
}

let start
function handleAnimate(){
  const millis = Date.now()
  start||(start=millis)
  const elapsed = millis-start
  setCSSProp('t', elapsed)
  requestAnimationFrame(handleAnimate)
}
handleAnimate()

function addInput(type,labelText,fn,props){ 
  const label = document.createElement('label')
  labelText && label.appendChild(document.createTextNode(labelText))
  const input = document.createElement('input')
  input.type = type
  props&&Object.entries(props).forEach(([k,v])=>input[k]=v)
  input.addEventListener({button:'click'}[type]||'input',fn)
  label.appendChild(input)
  form.appendChild(label)
}

function setCSSProp(name, value){
  mainStyle.setProperty(`--${name}`, value)
}


function makeNoiseDataURL(size = 128, fn, seed) {
  const canvas = document.createElement('canvas')
  canvas.width = size
  canvas.height = size
  const ctx = canvas.getContext('2d')
  const imgData = ctx.createImageData(size, size)
  const data = imgData.data

  for (let i = 0; i < data.length; i += 4) {
    data[i] =
      data[i + 1] =
      data[i + 2] = (fn?fn(rand()):rand()) * 255
    data[i + 3] = 255
  }

  ctx.putImageData(imgData, 0, 0)
  return canvas.toDataURL('image/png')
}

</script>
</body>
